{% extends 'base.html' %}
{% block title %}Update Patient Count{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h6 class="mb-3">Room • {{ object.hospital.name }} / {{ object.name }}</h6>
        <form method="post">
          {% csrf_token %}
          {{ form.non_field_errors }}
          <div class="mb-3">
            <label class="form-label">Current Patients</label>
            {{ form.current_patient_count }}
          </div>
          <button class="btn btn-primary">Save</button>
          <a class="btn btn-outline-secondary" href="{% url 'hospital:attendant_dashboard' %}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
